<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monthly Habit Tracker - PRIMORAS</title>
    <link rel="stylesheet" href="/src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      // Load Theme immediately to prevent flash
      if (localStorage.getItem('theme') === 'light') {
        document.documentElement.classList.add('light-mode');
      }
    </script>
    <style>
      body { 
        background-color: transparent; 
        color: white; 
        overflow-x: hidden; 
        overflow-y: auto;
        font-family: 'Rockwell', serif;
        transition: 0.5s;
      }
      
      /* Light Mode Overrides */
      html.light-mode body { color: #111; }
      html.light-mode #bg-canvas { filter: brightness(1) invert(0.85); }
      html.light-mode .panel, html.light-mode .chart-container { 
        background: rgba(255, 255, 255, 0.85); 
        box-shadow: 0 30px 60px rgba(0,0,0,0.1), 0 0 40px rgba(255, 0, 51, 0.1); 
      }
      html.light-mode .tracker-table th { background: rgba(200,200,200,0.6); color: #333; }
      html.light-mode .tracker-table td { background: rgba(240,240,240,0.5); }
      html.light-mode .tracker-table th.habit-col, html.light-mode .tracker-table td.habit-col { background: rgba(255,255,255,0.9); }
      html.light-mode .habit-input { background: rgba(255,255,255,0.8); color: black; }
      html.light-mode .nav-back { background: rgba(255,255,255,0.8); color: black; }
      html.light-mode .completed-val { color: black !important; }
      html.light-mode .settings-btn { background: rgba(255,255,255,0.8); color: black; border-color: rgba(0,0,0,0.2); }
      html.light-mode .settings-btn:hover { background: black; color: white; }

      /* HYROX Light Mode Adjustments */
      body.theme-hyrox.light-mode .panel, body.theme-hyrox.light-mode .chart-container {
        box-shadow: 0 30px 60px rgba(0,0,0,0.1), 0 0 40px rgba(255, 204, 0, 0.2);
      }

      .top-nav {
        position: fixed;
        top: 2rem;
        left: 2rem;
        right: 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
      }
      .nav-back {
        color: white;
        text-decoration: none;
        font-weight: bold;
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(0,0,0,0.5);
        padding: 0.5rem 1.5rem;
        border-radius: 50px;
        backdrop-filter: blur(10px);
        border: 1px solid #ff0033;
        transition: 0.3s;
      }
      .nav-back:hover { background: #ff0033; color: white; transform: translateY(-3px); box-shadow: 0 0 15px rgba(255,0,51,0.5); }
      
      .settings-group {
        display: flex;
        gap: 10px;
      }
      .settings-btn {
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 50px;
        font-size: 0.8rem;
        letter-spacing: 1px;
        cursor: pointer;
        transition: 0.3s;
        backdrop-filter: blur(10px);
        font-weight: bold;
      }
      .settings-btn:hover { background: white; color: black; }

      .dashboard {
        width: 98%;
        max-width: 1800px;
        margin: 6rem auto 4rem auto;
      }

      /* Panel Base */
      .panel {
        background: rgba(5, 5, 5, 0.85); 
        backdrop-filter: blur(12px);
        border: 1px solid #ff0033; 
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(255, 0, 51, 0.2);
        transition: 0.5s;
      }

      /* Tabs (Months) */
      .header-controls {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 15px;
        border-bottom: 1px solid rgba(255,0,51,0.3);
        padding-bottom: 10px;
        flex-wrap: wrap;
        gap: 1rem;
        position: relative;
        z-index: 50;
        transition: 0.5s;
      }
      .tabs-container {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .tab {
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        color: #888;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        transition: 0.2s;
      }
      .tab:hover { color: #ff0033; background: rgba(255,0,51,0.1); }
      .tab.active { background: #ff0033; color: #fff; box-shadow: 0 0 15px rgba(255,0,51,0.5);}
      
      /* Control Buttons & Inputs */
      .actions-container {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .habit-input {
        background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,0,51,0.5);
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: 0.5s;
      }
      .habit-input:focus { border-color: #ff0033; box-shadow: 0 0 10px rgba(255,0,51,0.5); }
      
      .add-btn { background: #00ff44; color: black; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
      .add-btn:hover { background: #00cc36; box-shadow: 0 0 15px rgba(0,255,68,0.6); }

      .clear-btn { background: transparent; color: #ff0033; border: 1px solid #ff0033; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; }
      .clear-btn:hover { background: rgba(255, 0, 51, 0.2); box-shadow: 0 0 15px rgba(255,0,51,0.5); }

      .generate-btn { background: linear-gradient(90deg, #aa0000, #ff0033); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; }
      .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 0, 51, 0.5); }

      .delete-btn { background: none; border: none; color: #ff0033; cursor: pointer; font-size: 1.1rem; margin-left: 5px; opacity: 0.5; transition: 0.2s; padding: 0 5px; }
      .delete-btn:hover { opacity: 1; transform: scale(1.2); text-shadow: 0 0 10px #ff0033; }
      .habit-name-wrapper { display: flex; justify-content: space-between; align-items: center; }

      /* Table Styles */
      .table-container {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 1rem;
      }
      .tracker-table th, .tracker-table td {
        min-width: 30px;
        padding: 0.5rem 0.2rem;
      }
      .check-box {
        width: 24px;
        height: 24px;
      }
      .tracker-table { width: 100%; border-collapse: collapse; }
      .tracker-table th, .tracker-table td { border: 1px solid rgba(255,0,51,0.2); padding: 0.4rem 0.2rem; text-align: center; font-size: 0.8rem; transition: 0.5s; }
      .tracker-table th { background: rgba(0,0,0,0.6); color: #ccc; font-weight: bold; }
      .tracker-table td { background: rgba(0,0,0,0.2); }
      .tracker-table tr:hover td { background: rgba(255,0,51,0.05); }
      
      .tracker-table th.habit-col, .tracker-table td.habit-col { text-align: left; background: rgba(10,10,10,0.9); min-width: 120px; font-weight: 600; border-right: 2px solid #ff0033; padding-left: 0.5rem; transition: 0.5s; }
      
      .check-box { width: 16px; height: 16px; border: 2px solid #550000; background: #000; margin: 0 auto; cursor: pointer; border-radius: 4px; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
      .check-box:hover { border-color: #ff0033; box-shadow: 0 0 10px rgba(255,0,51,0.5);}
      .check-box.checked { background: #00ff44; border-color: #00ff44; box-shadow: 0 0 10px rgba(0,255,68,0.5);}
      .check-box.checked::after { content: '✓'; color: black; font-weight: 900; font-size: 0.7rem; }
      
      .progress-wrapper { width: 80px; height: 10px; background: #000; border-radius: 5px; overflow: hidden; margin: 0 auto; border: 1px solid rgba(255,0,51,0.3); transition: 0.5s; }
      .progress-bar { height: 100%; background: linear-gradient(90deg, #ff0033, #00ff44); transition: width 0.3s, background 0.5s; box-shadow: 0 0 10px rgba(255,0,51,0.5); }
      
      .chart-container { margin-top: 2rem; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(12px); border: 1px solid #ff0033; border-radius: 12px; padding: 1.5rem; height: 350px; box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(255, 0, 51, 0.2); transition: 0.5s; }

      /* HYROX THEME OVERRIDES */
      body.theme-hyrox .nav-back { border-color: #ffcc00; }
      body.theme-hyrox .nav-back:hover { background: #ffcc00; color: black; box-shadow: 0 0 15px rgba(255,204,0,0.5); }
      body.theme-hyrox .panel { border-color: #ffcc00; box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(255, 204, 0, 0.2); }
      body.theme-hyrox .header-controls { border-bottom-color: rgba(255,204,0,0.3); }
      body.theme-hyrox .tab:hover { color: #ffcc00; background: rgba(255,204,0,0.1); }
      body.theme-hyrox .tab.active { background: #ffcc00; color: black; box-shadow: 0 0 15px rgba(255,204,0,0.5); }
      body.theme-hyrox .habit-input { border-color: rgba(255,204,0,0.5); }
      body.theme-hyrox .habit-input:focus { border-color: #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.5); }
      body.theme-hyrox .add-btn { background: #ffcc00; color: black; }
      body.theme-hyrox .add-btn:hover { background: #ffe600; box-shadow: 0 0 15px rgba(255, 204, 0, 0.6); }
      body.theme-hyrox .clear-btn { color: #ffcc00; border-color: #ffcc00; }
      body.theme-hyrox .clear-btn:hover { background: rgba(255, 204, 0, 0.2); box-shadow: 0 0 15px rgba(255, 204, 0, 0.5); }
      body.theme-hyrox .generate-btn { background: linear-gradient(90deg, #cc9900, #ffcc00); color: black; }
      body.theme-hyrox .generate-btn:hover { box-shadow: 0 10px 25px rgba(255, 204, 0, 0.5); }
      body.theme-hyrox .tracker-table th, body.theme-hyrox .tracker-table td { border-color: rgba(255,204,0,0.2); }
      body.theme-hyrox .tracker-table tr:hover td { background: rgba(255,204,0,0.05); }
      body.theme-hyrox .tracker-table th.habit-col, body.theme-hyrox .tracker-table td.habit-col { border-right-color: #ffcc00; }
      body.theme-hyrox .check-box { border-color: #554400; }
      body.theme-hyrox .check-box:hover { border-color: #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.5); }
      body.theme-hyrox .check-box.checked { background: #ffcc00; border-color: #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.5); }
      body.theme-hyrox .check-box.checked::after { color: black; }
      body.theme-hyrox .progress-wrapper { border-color: rgba(255,204,0,0.3); }
      body.theme-hyrox .progress-bar { background: linear-gradient(90deg, #ffcc00, #ffee55); box-shadow: 0 0 10px rgba(255,204,0,0.5); }
      body.theme-hyrox .chart-container { border-color: #ffcc00; box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 40px rgba(255, 204, 0, 0.2); }
    </style>
  </head>
  <body>
    <!-- 3D Canvas Background -->
    <canvas id="bg-canvas"></canvas>

    <div class="top-nav">
      <a href="index.html" class="nav-back" id="nav-back">&larr; BACK</a>
      <div class="settings-group">
        <button class="settings-btn" id="lang-toggle">TH</button>
        <button class="settings-btn" id="theme-toggle">☀️ LIGHT</button>
      </div>
    </div>

    <div class="dashboard">
      <div class="panel">
        
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 1rem;">
          <h2 style="margin:0; font-size:1.8rem; letter-spacing:1px; text-shadow: 0 0 20px rgba(255,0,51,0.5); transition: 0.5s;" id="main-title">
            HABITS TRACKER
          </h2>
          <span id="month-title" style="color:#ff0033; font-size: 1.8rem; font-weight: 900; margin-left: 10px; text-shadow: 0 0 20px rgba(255,0,51,0.8); transition: 0.5s;">JANUARY</span>
        </div>
        
        <div class="header-controls">
          <div class="tabs-container" id="tabs-container"></div>
          
          <div class="actions-container">
            <input type="text" id="new-habit-input" placeholder="New Habit..." class="habit-input">
            <button type="button" class="add-btn" id="add-btn">+ Add</button>
            <button type="button" class="clear-btn" id="clear-btn">💀 Clear Table</button>
            <button type="button" class="generate-btn" id="generate-btn">⚡ Auto-Generate Plan</button>
          </div>
        </div>
        
        <div class="table-container">
          <table class="tracker-table" id="tracker-table">
            <thead>
              <tr id="table-header"></tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
      
      <!-- Graph Section -->
      <div class="chart-container">
        <h3 id="graph-title" style="margin-top:0; color:#888; font-size:1rem; letter-spacing:1px;">DAILY PERFORMANCE GRAPH</h3>
        <canvas id="progressChart"></canvas>
      </div>
      
    </div>
    
    <script type="module" src="/src/explore-3d.js"></script>

    <script>
      // Web Audio API helper for sound effects
      function playSound(frequency, duration) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start();
        oscillator.stop(ctx.currentTime + duration / 1000);
      }
      function playClang() { playSound(600, 100); }
      function playDing() { playSound(900, 150); }
      
      // LANGUAGE & SETTINGS LOGIC
      const translations = {
        'en': {
          back: "&larr; BACK",
          mainTitle: "HABITS TRACKER",
          inputPlaceholder: "New Habit...",
          addBtn: "+ Add",
          clearBtn: "💀 Clear Table",
          genBtn: "⚡ Auto-Generate",
          tableHabits: "HABITS",
          tableCompleted: "COMPLETED",
          tableSuccess: "SUCCESS %",
          tableProgress: "PROGRESS",
          graphTitle: "DAILY PERFORMANCE GRAPH",
          langBtn: "TH",
          themeLight: "☀️ LIGHT",
          themeDark: "🌙 DARK",
          alertEmpty: "Please enter a habit name."
        },
        'th': {
          back: "&larr; กลับ",
          mainTitle: "ตารางซ้อม",
          inputPlaceholder: "เพิ่มรายการ...",
          addBtn: "+ เพิ่ม",
          clearBtn: "💀 ล้างตาราง",
          genBtn: "⚡ สร้างแผนอัตโนมัติ",
          tableHabits: "รายการฝึกซ้อม",
          tableCompleted: "สำเร็จ (วัน)",
          tableSuccess: "อัตราสำเร็จ",
          tableProgress: "ความคืบหน้า",
          graphTitle: "กราฟสรุปผลการฝึกซ้อมรายวัน",
          langBtn: "EN",
          themeLight: "☀️ สว่าง",
          themeDark: "🌙 มืด",
          alertEmpty: "กรุณาพิมพ์ชื่อสิ่งที่ต้องการเพิ่มครับ"
        }
      };

      let currentLang = localStorage.getItem('lang') || 'en';
      let isLightMode = document.documentElement.classList.contains('light-mode');

      function updateLanguageUI() {
        const t = translations[currentLang];
        document.getElementById('nav-back').innerHTML = t.back;
        document.getElementById('main-title').textContent = t.mainTitle;
        document.getElementById('new-habit-input').placeholder = t.inputPlaceholder;
        document.getElementById('add-btn').textContent = t.addBtn;
        document.getElementById('clear-btn').innerHTML = t.clearBtn;
        document.getElementById('generate-btn').innerHTML = t.genBtn;
        document.getElementById('graph-title').textContent = t.graphTitle;
        
        document.getElementById('lang-toggle').textContent = t.langBtn;
        document.getElementById('theme-toggle').textContent = isLightMode ? t.themeDark : t.themeLight;
        
        // Render table to update table headers
        if (months.length > 0) renderTable();
      }

      document.getElementById('lang-toggle').addEventListener('click', () => {
        currentLang = currentLang === 'en' ? 'th' : 'en';
        localStorage.setItem('lang', currentLang);
        updateLanguageUI();
      });

      document.getElementById('theme-toggle').addEventListener('click', () => {
        isLightMode = !isLightMode;
        if(isLightMode) {
          document.documentElement.classList.add('light-mode');
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.classList.remove('light-mode');
          localStorage.setItem('theme', 'dark');
        }
        document.getElementById('theme-toggle').textContent = isLightMode ? translations[currentLang].themeDark : translations[currentLang].themeLight;
      });

      // CORE HABIT TRACKER LOGIC
      // Parse URL Parameter
      const urlParams = new URLSearchParams(window.location.search);
      let currentMode = urlParams.get('mode') === 'hyrox' ? 'HYROX' : 'RUNNING'; 
      
      let habits = {
        'RUNNING': ["Drink Water", "Warm up", "Easy Run", "Interval", "Tempo Run", "Strength"],
        'HYROX': [
            "Strength (Squats/Lunges/Deadlifts)", 
            "Compromised Running (Run + Wall Balls)", 
            "HYROX Circuit (SkiErg/Row/Burpees)", 
            "Active Recovery (Yoga/Stretch)", 
            "Interval + Strength (Run + Sled/Carry)", 
            "Long Run (5-7km)", 
            "Rest (Full Recovery)"
        ]
      };
      
      const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
      const fullMonths = ['JANUARY', 'FEBRUARY', 'MARCH', 'APRIL', 'MAY', 'JUNE', 'JULY', 'AUGUST', 'SEPTEMBER', 'OCTOBER', 'NOVEMBER', 'DECEMBER'];
      
      const currentYear = new Date().getFullYear();
      const daysInMonths = [];
      for(let i = 0; i < 12; i++) {
        daysInMonths.push(new Date(currentYear, i + 1, 0).getDate()); 
      }
      
      let currentMonthIndex = new Date().getMonth(); 
      
      let habitData = {
          'RUNNING': {},
          'HYROX': {}
      }; 
      let chartInstance = null;

      function initData() {
        document.getElementById('month-title').textContent = fullMonths[currentMonthIndex];
        
        months.forEach((m, mIdx) => {
          habitData['RUNNING'][mIdx] = [];
          habits['RUNNING'].forEach((h, hIdx) => {
            habitData['RUNNING'][mIdx][hIdx] = new Array(daysInMonths[mIdx]).fill(false);
          });
          
          habitData['HYROX'][mIdx] = [];
          habits['HYROX'].forEach((h, hIdx) => {
            habitData['HYROX'][mIdx][hIdx] = new Array(daysInMonths[mIdx]).fill(false);
          });
        });
      }

      function applyModeTheme() {
          document.body.classList.toggle('theme-hyrox', currentMode === 'HYROX');
          if(currentMode === 'HYROX') {
              document.getElementById('month-title').style.color = '#ffcc00';
              document.getElementById('month-title').style.textShadow = '0 0 20px rgba(255, 204, 0, 0.8)';
              document.getElementById('main-title').style.textShadow = '0 0 20px rgba(255, 204, 0, 0.5)';
              
              if(chartInstance) {
                chartInstance.data.datasets[0].borderColor = '#ffcc00';
                chartInstance.data.datasets[0].backgroundColor = 'rgba(255, 204, 0, 0.15)';
                chartInstance.data.datasets[0].pointBackgroundColor = '#fff';
              }
          } else {
              document.getElementById('month-title').style.color = '#ff0033';
              document.getElementById('month-title').style.textShadow = '0 0 20px rgba(255, 0, 51, 0.8)';
              document.getElementById('main-title').style.textShadow = '0 0 20px rgba(255, 0, 51, 0.5)';
              
              if(chartInstance) {
                chartInstance.data.datasets[0].borderColor = '#ff0033';
                chartInstance.data.datasets[0].backgroundColor = 'rgba(255, 0, 51, 0.15)';
                chartInstance.data.datasets[0].pointBackgroundColor = '#00ff44';
              }
          }
      }

      function renderTabs() {
        const container = document.getElementById('tabs-container');
        container.innerHTML = '';
        months.forEach((m, idx) => {
          const tab = document.createElement('div');
          tab.className = `tab ${idx === currentMonthIndex ? 'active' : ''}`;
          tab.textContent = m;
          tab.onclick = () => {
            currentMonthIndex = idx;
            document.getElementById('month-title').textContent = fullMonths[idx];
            renderTabs(); 
            renderTable(); 
            updateChart(); 
          };
          container.appendChild(tab);
        });
      }

      function renderTable() {
        const thead = document.getElementById('table-header');
        const tbody = document.getElementById('table-body');
        const days = daysInMonths[currentMonthIndex];
        
        const currentHabits = habits[currentMode];
        const currentData = habitData[currentMode][currentMonthIndex];
        
        const t = translations[currentLang];
        
        let headerHtml = `<th style="width: 30px;">#</th><th class="habit-col">${t.tableHabits}</th>`;
        for(let i=1; i<=days; i++) {
          headerHtml += `<th>${i}</th>`;
        }
        headerHtml += `<th>${t.tableCompleted}</th><th>${t.tableSuccess}</th><th>${t.tableProgress}</th>`;
        thead.innerHTML = headerHtml;
        
        tbody.innerHTML = '';
        currentHabits.forEach((habit, hIdx) => {
          let row = document.createElement('tr');
          let checksHtml = '';
          for(let d=0; d<days; d++) {
            const isChecked = currentData[hIdx][d];
            checksHtml += `<td><div class="check-box ${isChecked ? 'checked' : ''}" data-h="${hIdx}" data-d="${d}"></div></td>`;
          }
          
          let html = `
            <td style="color:#888;">${hIdx + 1}</td>
            <td class="habit-col">
              <div class="habit-name-wrapper">
                <span>${habit}</span>
                <button class="delete-btn" onclick="deleteHabit(${hIdx})" title="Delete Habit">✕</button>
              </div>
            </td>
            ${checksHtml}
            <td class="completed-val" style="font-weight:bold; color:white;">0</td>
            <td class="success-val" style="color:#aaa;">0.00%</td>
            <td>
              <div class="progress-wrapper">
                <div class="progress-bar" style="width: 0%"></div>
              </div>
            </td>
          `;
          row.innerHTML = html;
          tbody.appendChild(row);
        });
        
        tbody.querySelectorAll('tr').forEach((row, hIdx) => {
          updateRowStats(row, hIdx);
          row.querySelectorAll('.check-box').forEach(box => {
            box.addEventListener('click', function() {
              const dIdx = parseInt(this.getAttribute('data-d'));
              const isChecked = !habitData[currentMode][currentMonthIndex][hIdx][dIdx];
              habitData[currentMode][currentMonthIndex][hIdx][dIdx] = isChecked;
              
              this.classList.toggle('checked');
              updateRowStats(row, hIdx);
              updateChart(); 
            });
          });
        });
      }

      function updateRowStats(row, hIdx) {
        const days = daysInMonths[currentMonthIndex];
        let completed = habitData[currentMode][currentMonthIndex][hIdx].filter(v => v).length;
        const successRate = ((completed / days) * 100).toFixed(2);
        
        row.querySelector('.completed-val').textContent = completed;
        row.querySelector('.success-val').textContent = successRate + '%';
        row.querySelector('.progress-bar').style.width = successRate + '%';
      }

      function addHabit() {
        try {
          const input = document.getElementById('new-habit-input');
          const name = input.value.trim();
          if(!name) {
             alert(translations[currentLang].alertEmpty);
             return;
          }
          
          habits[currentMode].push(name);
          months.forEach((m, mIdx) => {
            if(habitData[currentMode][mIdx]) {
              habitData[currentMode][mIdx].push(new Array(daysInMonths[mIdx]).fill(false));
            }
          });
          
          input.value = '';
          renderTable();
          updateChart();
        } catch(e) {
          console.error(e);
        }
      }

      window.deleteHabit = function(hIdx) {
        habits[currentMode].splice(hIdx, 1);
        months.forEach((m, mIdx) => {
          habitData[currentMode][mIdx].splice(hIdx, 1);
        });
        
        renderTable();
        updateChart();
      }

      function clearTable() {
        const days = daysInMonths[currentMonthIndex];
        const currentHabits = habits[currentMode];
        
        currentHabits.forEach((habit, hIdx) => {
          for(let d=0; d<days; d++) {
            habitData[currentMode][currentMonthIndex][hIdx][d] = false;
          }
        });
        
        renderTable();
        updateChart();
      }

      function autoGeneratePlan() {
        const days = daysInMonths[currentMonthIndex];
        const currentHabits = habits[currentMode];
        const currentData = habitData[currentMode][currentMonthIndex];
        
        currentHabits.forEach((habit, hIdx) => {
          let hName = habit.toLowerCase();
          
          for(let d=0; d<days; d++) {
            let date = new Date(currentYear, currentMonthIndex, d + 1);
            let dayOfWeek = date.getDay(); // 0 = Sun, 1 = Mon, ..., 6 = Sat
            
            let check = false;
            
            if (currentMode === 'RUNNING') {
                if(hName.includes("water") || hName.includes("warm") || hName.includes("stretch")) { check = true; }
                else if(hName.includes("easy") || hName.includes("recovery")) { if(dayOfWeek === 2 || dayOfWeek === 4) check = true; }
                else if(hName.includes("interval") || hName.includes("speed")) { if(dayOfWeek === 3) check = true; }
                else if(hName.includes("tempo") || hName.includes("threshold")) { if(dayOfWeek === 5) check = true; }
                else if(hName.includes("long") || hName.includes("lsd")) { if(dayOfWeek === 0) check = true; }
                else if(hName.includes("strength") || hName.includes("weight") || hName.includes("core")) { if(dayOfWeek === 1 || dayOfWeek === 6) check = true; }
                else if(hName.includes("rest") || hName.includes("พัก")) { if(dayOfWeek === 1) check = true; }
                else { if(Math.random() > 0.6) check = true; }
            } else {
                if (hName.includes("strength") && !hName.includes("interval")) { if(dayOfWeek === 1) check = true; }
                else if (hName.includes("compromised")) { if(dayOfWeek === 2) check = true; }
                else if (hName.includes("circuit") || hName.includes("hyrox")) { if(dayOfWeek === 3) check = true; }
                else if (hName.includes("active recovery") || hName.includes("yoga") || hName.includes("stretch")) { if(dayOfWeek === 4) check = true; }
                else if (hName.includes("interval + strength") || hName.includes("sled")) { if(dayOfWeek === 5) check = true; }
                else if (hName.includes("long run") || hName.includes("วิ่งระยะไกล")) { if(dayOfWeek === 6) check = true; }
                else if (hName.includes("rest") || hName.includes("พัก")) { if(dayOfWeek === 0) check = true; }
                else { if(Math.random() > 0.7) check = true; }
            }
            
            currentData[hIdx][d] = check;
          }
        });
        
        renderTable();
        updateChart();
      }

      function initChart() {
        const ctx = document.getElementById('progressChart').getContext('2d');
        Chart.defaults.elements.line.borderWidth = 3;
        
        chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: [],
            datasets: [{
              label: 'Completed Tasks',
              data: [],
              borderColor: '#ff0033',
              backgroundColor: 'rgba(255, 0, 51, 0.15)',
              pointBackgroundColor: '#00ff44',
              pointBorderColor: '#000',
              pointRadius: 5,
              pointHoverRadius: 8,
              fill: true,
              tension: 0.4 
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: 'rgba(0,0,0,0.9)',
                titleColor: '#fff', 
                bodyColor: '#fff',
                borderColor: '#ffffff',
                borderWidth: 1,
                padding: 10
              }
            },
            scales: {
              x: {
                grid: { color: 'rgba(150,150,150,0.1)', drawBorder: false }, 
                ticks: { color: '#888' }
              },
              y: {
                grid: { color: 'rgba(150,150,150,0.1)', drawBorder: false },
                ticks: { color: '#888', stepSize: 1, beginAtZero: true }
              }
            }
          }
        });
      }

      function updateChart() {
        const days = daysInMonths[currentMonthIndex];
        const labels = Array.from({length: days}, (_, i) => i + 1);
        
        const dailySums = new Array(days).fill(0);
        const currentHabits = habits[currentMode];
        const currentData = habitData[currentMode][currentMonthIndex];
        
        currentHabits.forEach((habit, hIdx) => {
          for(let d=0; d<days; d++) {
            if(currentData[hIdx][d]) dailySums[d]++;
          }
        });

        chartInstance.data.labels = labels;
        chartInstance.data.datasets[0].data = dailySums;
        chartInstance.update();
      }

      // Add sound on check-box toggle
      function attachCheckBoxSounds() {
        document.querySelectorAll('.check-box').forEach(box => {
          box.addEventListener('click', function() {
            // Play clang sound when toggling check
            playClang();
          });
        });
      }

      // Add sound on generate (random) button
      document.getElementById('generate-btn').addEventListener('click', function() {
        playDing();
        autoGeneratePlan();
      });


      // Call attachCheckBoxSounds after table render
      const originalRenderTable = renderTable;
      renderTable = function() {
        originalRenderTable();
        attachCheckBoxSounds();
      };

      // Initial call to attach sounds will happen during normal init
      document.getElementById('clear-btn').addEventListener('click', clearTable);
      document.getElementById('add-btn').addEventListener('click', addHabit);
      document.getElementById('new-habit-input').addEventListener('keypress', function(e) {
        if(e.key === 'Enter') addHabit();
      });

      // Initialization Sequence
      initData();
      initChart();
      applyModeTheme(); // Apply the theme based on URL parameter immediately
      updateLanguageUI(); // Update UI translations (also calls renderTable)
      renderTabs(); // Render month tabs
      updateChart();
    </script>
  </body>
</html>
